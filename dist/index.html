<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飞机大战 - 人机对战</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #050816;
      --bg-1: #091225;
      --bg-2: #12264a;
      --panel: rgba(10, 18, 36, 0.82);
      --panel-edge: rgba(120, 169, 255, 0.28);
      --cyan: #59f0ff;
      --rose: #ff6f8e;
      --gold: #ffd166;
      --text: #eef4ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(89, 240, 255, 0.12), transparent 24%),
        radial-gradient(circle at 80% 14%, rgba(255, 111, 142, 0.12), transparent 26%),
        radial-gradient(circle at 50% 85%, rgba(255, 209, 102, 0.08), transparent 32%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 38%, var(--bg-0) 100%);
      color: var(--text);
      font-family: 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
      letter-spacing: 0.02em;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.18;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.12));
    }

    #gameContainer {
      position: relative;
      padding: 18px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(11, 18, 34, 0.72), rgba(5, 8, 22, 0.88));
      border: 1px solid rgba(120, 169, 255, 0.18);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 28px 80px rgba(0, 0, 0, 0.55),
        0 0 40px rgba(89, 240, 255, 0.08);
      backdrop-filter: blur(16px);
      isolation: isolate;
    }

    #gameContainer::before {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 18px;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(89, 240, 255, 0.08), transparent 22%),
        linear-gradient(315deg, rgba(255, 111, 142, 0.08), transparent 22%);
      opacity: 0.9;
      z-index: 0;
    }

    #gameContainer::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    canvas {
      display: block;
      position: relative;
      z-index: 1;
      background:
        radial-gradient(circle at 50% 0%, rgba(89, 240, 255, 0.08), transparent 28%),
        linear-gradient(180deg, rgba(11, 16, 33, 0.96), rgba(8, 12, 24, 0.98));
      border-radius: 18px;
      border: 1px solid rgba(93, 128, 206, 0.36);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 0 40px rgba(7, 18, 44, 0.78) inset,
        0 12px 42px rgba(0, 0, 0, 0.45);
    }
  </style>
  <script type="module" crossorigin src="./assets/index-DmUrpjw_.js"></script>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
  </div>
</body>
</html>
